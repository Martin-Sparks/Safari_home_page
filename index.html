<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>

<main>
    <div class="time-section">
        <p class="greeting" id="greeting">Hello, Martin</p>
        <h1 class="clock" id="clock">00:00</h1>
        <p class="date" id="date">Loading...</p>
    </div>

    <form class="search-form" action="https://www.google.com/search" method="GET">
        <div class="search-wrap">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path stroke-linecap="round" d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" name="q" class="search-input" placeholder="Search Google..." autofocus>
        </div>
    </form>

    <div class="shortcuts">
        <a href="https://old.reddit.com" class="shortcut">
            <img src="https://www.google.com/s2/favicons?domain=reddit.com&sz=64" alt="">
            <span>Reddit</span>
        </a>
        <a href="https://github.com" class="shortcut">
            <img src="https://www.google.com/s2/favicons?domain=github.com&sz=64" alt="">
            <span>GitHub</span>
        </a>
        <a href="https://instagram.com" class="shortcut">
            <img src="https://www.google.com/s2/favicons?domain=instagram.com&sz=64" alt="">
            <span>Instagram</span>
        </a>
        <a href="https://gemini.google.com" class="shortcut">
            <img src="https://www.google.com/s2/favicons?domain=gemini.google.com&sz=64" alt="">
            <span>Gemini</span>
        </a>
        <a href="https://youtube.com" class="shortcut">
            <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=64" alt="">
            <span>YouTube</span>
        </a>
        <a href="https://app.plex.tv/desktop/#!" class="shortcut">
            <img src="https://www.google.com/s2/favicons?domain=plex.tv&sz=64" alt="">
            <span>Plex</span>
        </a>
    </div>
</main>

<footer class="ticker-bar">
    <span class="ticker-label">HN</span>
    <div class="ticker-viewport">
        <div class="ticker-track" id="ticker-track">Fetching Hacker News...</div>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
